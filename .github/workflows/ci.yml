name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Python compiles
        run: python3 -m py_compile bin/ramsteind bin/ramstein bin/ramstein-healthcheck bin/ramstein-update bin/sutra.py

      - name: Shell scripts parse
        run: bash -n install.sh uninstall.sh tests/smoke.sh

      - name: Shellcheck
        run: shellcheck install.sh uninstall.sh tests/smoke.sh

      - name: check-sutra (vendored copy integrity)
        run: make check-sutra

      - name: Smoke (real daemon, real /proc, hostile socket input)
        run: make smoke

      - name: Attack (full cmd surface + oversized/garbage/invalid-utf8/nested/unknown/rapid-reconnect/half-open-stall)
        run: make attack

      - name: Man pages render without warnings
        run: |
          groff -man -Tutf8 -ww man/ramstein.1 > /dev/null
          groff -t -man -Tutf8 -ww man/ramsteind.8 > /dev/null
